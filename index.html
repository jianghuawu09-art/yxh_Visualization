<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>亿星汇 | 服饰销售退货分析系统</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.0/dist/axios.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: radial-gradient(circle at 20% 30%, #0A1620, #03090F); font-family: 'Microsoft YaHei', sans-serif; overflow: hidden; height: 100vh; width: 100vw; }
        /* 登录界面 */
        .login-container { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; position: fixed; top: 0; left: 0; z-index: 1000; background: radial-gradient(circle at 30% 20%, #0a192f, #02090f); }
        .login-box { background: rgba(8, 28, 45, 0.75); backdrop-filter: blur(12px); border: 1px solid rgba(198, 168, 98, 0.7); border-radius: 28px; padding: 48px 42px; width: 440px; }
        .login-box h2 { text-align: center; color: #E8C87A; font-size: 28px; margin-bottom: 32px; }
        .input-group { margin-bottom: 24px; }
        .input-group input { width: 100%; padding: 14px 18px; background: rgba(0, 30, 50, 0.6); border: 1px solid rgba(198, 168, 98, 0.6); border-radius: 48px; color: #F5EAD5; font-size: 16px; outline: none; }
        .login-btn { width: 100%; padding: 14px; background: linear-gradient(95deg, #C6A862, #E8C87A); border: none; border-radius: 48px; color: #0A1C28; font-size: 18px; font-weight: bold; cursor: pointer; }
        .tip { color: #F4A261; text-align: center; margin-top: 16px; font-size: 14px; display: none; }
        /* 主界面 */
        .main-container { display: none; width: 100vw; height: 100vh; background: #050E16; overflow: hidden; display: flex; }
        .sidebar { width: 180px; background: rgba(10, 25, 38, 0.65); backdrop-filter: blur(12px); border-right: 1px solid rgba(198, 168, 98, 0.45); display: flex; flex-direction: column; }
        .sidebar-title { text-align: center; font-size: 20px; color: #E2CD9C; padding: 28px 0 20px; border-bottom: 1px solid rgba(198,168,98,0.4); }
        .menu-item { padding: 16px 20px; color: #CCD6E0; font-size: 15px; cursor: pointer; border-left: 3px solid transparent; transition: all 0.25s; margin: 6px 12px; border-radius: 40px; }
        .menu-item.active { background: rgba(198, 168, 98, 0.2); color: #F2DEA2; border-left-color: #C6A862; }
        .content-area { flex: 1; overflow-y: auto; padding: 20px 28px 28px 28px; }
        .dashboard-title { text-align: center; font-size: 32px; color: #F4E5C7; margin-bottom: 26px; }
        .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; margin-bottom: 32px; }
        .kpi-card { background: rgba(12, 28, 42, 0.7); border-radius: 28px; padding: 22px 12px; text-align: center; border: 1px solid rgba(198,168,98,0.45); }
        .kpi-value { font-size: 48px; font-weight: 800; color: #F3D77C; font-family: monospace; }
        .kpi-label { font-size: 16px; color: #C8D1DC; margin-top: 8px; }
        .visual-layout { display: flex; gap: 24px; margin-bottom: 28px; }
        .charts-matrix { flex: 3.5; display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .chart-card { background: rgba(8, 24, 38, 0.65); border-radius: 28px; border: 1px solid rgba(198,168,98,0.4); padding: 14px 12px 12px 12px; }
        .chart-card h4 { font-size: 16px; color: #E5D6AF; border-left: 3px solid #C6A862; padding-left: 12px; margin-bottom: 12px; }
        .chart-box { width: 100%; height: 230px; }
        .filter-panel { flex: 1.2; background: rgba(10, 25, 38, 0.7); border-radius: 32px; border: 1px solid rgba(198,168,98,0.5); padding: 20px 18px; }
        .filter-header { font-size: 20px; color: #EFDFB0; border-left: 4px solid #C6A862; padding-left: 14px; margin-bottom: 20px; }
        .filter-row { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .filter-row label { font-size: 13px; color: #B7C3CE; }
        select { background: #0E1F2C; border: 1px solid #3F5568; border-radius: 40px; padding: 10px 14px; color: #F2E5CA; font-size: 13px; outline: none; }
        .filter-actions { display: flex; gap: 14px; margin-top: 12px; }
        .filter-btn { flex: 1; background: rgba(198,168,98,0.2); border: 1px solid #C6A862; border-radius: 40px; padding: 8px 0; text-align: center; color: #F2E2B5; font-size: 14px; cursor: pointer; }
        .filter-btn.reset { background: rgba(50,65,85,0.6); border-color: #6A7C8E; }
        .remark-section { background: rgba(8, 22, 34, 0.7); border-radius: 28px; border: 1px solid rgba(198,168,98,0.45); padding: 18px 20px; margin-top: 12px; }
        .remark-title { font-size: 17px; color: #ECDCAF; margin-bottom: 14px; }
        .remark-table { width: 100%; border-collapse: collapse; font-size: 12px; color: #DBE2EA; }
        .remark-table th { text-align: left; padding: 10px 6px; color: #E8CF93; border-bottom: 1px solid rgba(198,168,98,0.4); }
        .remark-table td { padding: 9px 6px; border-bottom: 1px solid rgba(198,168,98,0.2); }
    </style>
</head>
<body>
    <!-- 登录界面 -->
    <div class="login-container" id="loginBox">
        <div class="login-box">
            <h2>亿星汇数据可视化大屏</h2>
            <div class="input-group">
                <input type="text" id="username" placeholder="请输入账号">
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder="请输入密码">
            </div>
            <button class="login-btn" onclick="login()">登录</button>
            <div class="tip" id="errTip">账号或密码错误</div>
        </div>
    </div>

    <!-- 主界面 -->
    <div class="main-container" id="mainPage" style="display:none;">
        <div class="sidebar">
            <div class="sidebar-title">系统菜单</div>
            <div class="menu-item active" onclick="switchPage('saleReturn')">销售退货可视化大屏</div>
        </div>

        <div class="content-area">
            <div id="saleReturnPage">
                <div class="dashboard-title">服饰销售退货数据可视化大屏</div>
                
                <!-- 指标卡片区 -->
                <div class="kpi-grid">
                    <div class="kpi-card"><div class="kpi-value" id="totalSaleVal">0</div><div class="kpi-label">总销售 (件)</div></div>
                    <div class="kpi-card"><div class="kpi-value" id="totalReturnVal">0</div><div class="kpi-label">总退货 (件)</div></div>
                    <div class="kpi-card"><div class="kpi-value" id="returnRateVal">0%</div><div class="kpi-label">退货率</div></div>
                    <div class="kpi-card"><div class="kpi-value" id="totalStyleVal">0</div><div class="kpi-label">总款式</div></div>
                </div>

                <!-- 主体区域：6个图表 + 右侧筛选栏 -->
                <div class="visual-layout">
                    <div class="charts-matrix">
                        <div class="chart-card"><h4>📈 月度退货趋势</h4><div id="trendLine" class="chart-box"></div></div>
                        <div class="chart-card"><h4>📏 不同尺码销量</h4><div id="sizeBarH" class="chart-box"></div></div>
                        <div class="chart-card"><h4>⚠️ 退货原因占比</h4><div id="reasonPie" class="chart-box"></div></div>
                        <div class="chart-card"><h4>🎨 颜色退货分布</h4><div id="colorPie" class="chart-box"></div></div>
                        <div class="chart-card"><h4>🏬 各店铺销量对比</h4><div id="storeBar" class="chart-box"></div></div>
                        <div class="chart-card"><h4>🌍 海外各国销量</h4><div id="countryBar" class="chart-box"></div></div>
                    </div>

                    <!-- 右侧筛选栏（完全匹配你的Excel字段） -->
                    <div class="filter-panel">
                        <div class="filter-header">🔍 数据筛选</div>
                        <div class="filter-row"><label>年份</label><select id="filterYear"><option>全部</option></select></div>
                        <div class="filter-row"><label>月份</label><select id="filterMonth"><option>全部</option></select></div>
                        <div class="filter-row"><label>分类</label><select id="filterCategory"><option>全部</option></select></div>
                        <div class="filter-row"><label>品名</label><select id="filterProduct"><option>全部</option></select></div>
                        <div class="filter-row"><label>店铺</label><select id="filterStore"><option>全部</option></select></div>
                        <div class="filter-row"><label>颜色</label><select id="filterColor"><option>全部</option></select></div>
                        <div class="filter-row"><label>国家</label><select id="filterCountry"><option>全部</option></select></div>
                        <div class="filter-row"><label>尺码</label><select id="filterSize"><option>全部</option></select></div>
                        <div class="filter-actions">
                            <div class="filter-btn reset" onclick="resetFilters()">重置</div>
                            <div class="filter-btn" onclick="applyFilters()">应用</div>
                        </div>
                    </div>
                </div>

                <!-- 底部退货备注数据列表 -->
                <div class="remark-section">
                    <div class="remark-title">📋 退货备注数据列表（最新5条）</div>
                    <table class="remark-table" id="remarkTable">
                        <thead>
                            <tr><th>年份</th><th>月份</th><th>品名</th><th>店铺</th><th>颜色</th><th>尺码</th><th>退货原因</th><th>退货备注</th></tr>
                        </thead>
                        <tbody id="remarkTbody">
                            <tr><td colspan="8">加载中...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        let chartTrend, chartSize, chartReason, chartColor, chartStore, chartCountry;
        let rawData = [];

        // 登录配置
        const USER_LIST = [
            { user: "admin", pwd: "123456" },
            { user: "wujianghua", pwd: "wjh123" }
        ];

        function login() {
            let user = document.getElementById("username").value;
            let pwd = document.getElementById("password").value;
            let check = USER_LIST.some(item => item.user === user && item.pwd === pwd);
            if(check){
                document.getElementById("loginBox").style.display = "none";
                document.getElementById("mainPage").style.display = "flex";
                initDashboard();
                loadDataFromBackend();
                window.addEventListener('resize', () => {
                    [chartTrend, chartSize, chartReason, chartColor, chartStore, chartCountry].forEach(ch => ch && ch.resize());
                });
            } else {
                document.getElementById("errTip").style.display = "block";
            }
        }

        function initDashboard() {
            chartTrend = echarts.init(document.getElementById('trendLine'));
            chartSize = echarts.init(document.getElementById('sizeBarH'));
            chartReason = echarts.init(document.getElementById('reasonPie'));
            chartColor = echarts.init(document.getElementById('colorPie'));
            chartStore = echarts.init(document.getElementById('storeBar'));
            chartCountry = echarts.init(document.getElementById('countryBar'));
        }

        // 从后端实时读取数据
        async function loadDataFromBackend() {
            try {
                // 本地调试用地址，部署时替换为cpolar地址：https://c31198f.r18.cpolar.top/api/data
                const res = await axios.get("http://127.0.0.1:8000/api/data");
                rawData = res.data || [];
                console.log("读取到的数据：", rawData);
                initFilterOptions(); // 初始化筛选下拉选项
                applyFilters(); // 初次渲染数据
            } catch (error) {
                console.error("后端数据读取失败：", error);
                alert("数据加载失败，请检查后端是否正常运行");
            }
        }

        // 初始化筛选下拉选项（根据Excel数据自动填充）
        function initFilterOptions() {
            if(!rawData.length) return;
            // 年份
            const years = [...new Set(rawData.map(row => row.年份))].sort();
            const yearSelect = document.getElementById('filterYear');
            years.forEach(y => yearSelect.innerHTML += `<option value="${y}">${y}</option>`);
            // 月份
            const months = [...new Set(rawData.map(row => row.月份))].sort((a,b)=>a-b);
            const monthSelect = document.getElementById('filterMonth');
            months.forEach(m => monthSelect.innerHTML += `<option value="${m}">${m}月</option>`);
            // 分类
            const categories = [...new Set(rawData.map(row => row.分类))];
            const categorySelect = document.getElementById('filterCategory');
            categories.forEach(c => categorySelect.innerHTML += `<option value="${c}">${c}</option>`);
            // 品名
            const products = [...new Set(rawData.map(row => row.品名))];
            const productSelect = document.getElementById('filterProduct');
            products.forEach(p => productSelect.innerHTML += `<option value="${p}">${p}</option>`);
            // 店铺
            const stores = [...new Set(rawData.map(row => row.店铺))];
            const storeSelect = document.getElementById('filterStore');
            stores.forEach(s => storeSelect.innerHTML += `<option value="${s}">${s}</option>`);
            // 颜色
            const colors = [...new Set(rawData.map(row => row.颜色))];
            const colorSelect = document.getElementById('filterColor');
            colors.forEach(c => colorSelect.innerHTML += `<option value="${c}">${c}</option>`);
            // 国家
            const countries = [...new Set(rawData.map(row => row.国家))];
            const countrySelect = document.getElementById('filterCountry');
            countries.forEach(c => countrySelect.innerHTML += `<option value="${c}">${c}</option>`);
            // 尺码
            const sizes = [...new Set(rawData.map(row => row.尺码))];
            const sizeSelect = document.getElementById('filterSize');
            sizes.forEach(s => sizeSelect.innerHTML += `<option value="${s}">${s}</option>`);
        }

        // 应用筛选
        function applyFilters() {
            if(!rawData.length) return;
            const year = document.getElementById('filterYear').value;
            const month = document.getElementById('filterMonth').value;
            const category = document.getElementById('filterCategory').value;
            const product = document.getElementById('filterProduct').value;
            const store = document.getElementById('filterStore').value;
            const color = document.getElementById('filterColor').value;
            const country = document.getElementById('filterCountry').value;
            const size = document.getElementById('filterSize').value;

            let filtered = rawData.filter(row => {
                if(year !== "全部" && row.年份 != year) return false;
                if(month !== "全部" && row.月份 != month) return false;
                if(category !== "全部" && row.分类 !== category) return false;
                if(product !== "全部" && row.品名 !== product) return false;
                if(store !== "全部" && row.店铺 !== store) return false;
                if(color !== "全部" && row.颜色 !== color) return false;
                if(country !== "全部" && row.国家 !== country) return false;
                if(size !== "全部" && row.尺码 !== size) return false;
                return true;
            });
            renderAllCharts(filtered);
            renderRemarkList(filtered);
        }

        function resetFilters() {
            document.getElementById('filterYear').value = "全部";
            document.getElementById('filterMonth').value = "全部";
            document.getElementById('filterCategory').value = "全部";
            document.getElementById('filterProduct').value = "全部";
            document.getElementById('filterStore').value = "全部";
            document.getElementById('filterColor').value = "全部";
            document.getElementById('filterCountry').value = "全部";
            document.getElementById('filterSize').value = "全部";
            applyFilters();
        }

        // 渲染所有图表（完全适配你的Excel字段）
        function renderAllCharts(data) {
            let totalSale = 0, totalReturn = 0;
            let monthReturn = {}, sizeSale = {}, reasonReturn = {}, colorReturn = {}, storeSale = {}, countrySale = {};
            let styleSet = new Set();

            data.forEach(row => {
                let sale = Number(row.销售数量) || 0;
                let ret = Number(row.退货数量) || 0;
                totalSale += sale;
                totalReturn += ret;
                // 月度退货趋势
                let mth = `${row.年份}-${row.月份}月`;
                monthReturn[mth] = (monthReturn[mth] || 0) + ret;
                // 尺码销量
                let sz = row.尺码 || "未知";
                sizeSale[sz] = (sizeSale[sz] || 0) + sale;
                // 退货原因
                let reason = row.退货原因 || "未知";
                reasonReturn[reason] = (reasonReturn[reason] || 0) + ret;
                // 颜色退货
                let col = row.颜色 || "未知";
                colorReturn[col] = (colorReturn[col] || 0) + ret;
                // 店铺销量
                let store = row.店铺 || "未知";
                storeSale[store] = (storeSale[store] || 0) + sale;
                // 国家销量
                let country = row.国家 || "未知";
                countrySale[country] = (countrySale[country] || 0) + sale;
                // 款式总数
                if(row.品名) styleSet.add(row.品名);
            });

            // 更新指标卡
            let rateVal = totalSale > 0 ? ((totalReturn/totalSale)*100).toFixed(1) : "0";
            document.getElementById('totalSaleVal').innerText = totalSale.toLocaleString();
            document.getElementById('totalReturnVal').innerText = totalReturn.toLocaleString();
            document.getElementById('returnRateVal').innerText = rateVal + "%";
            document.getElementById('totalStyleVal').innerText = styleSet.size;

            // 1. 月度退货趋势折线图
            chartTrend.setOption({
                backgroundColor:'transparent',
                tooltip:{trigger:'axis'},
                // 👇 新增这一段，让图表整体下移
                grid: {
                    top: '15%',
                    bottom: '1%',  // 这个值越小，图表越往下
                    left: '10%',
                    right: '10%',
                    containLabel: true
                },
                xAxis:{ type:'category', data:Object.keys(monthReturn), axisLabel:{color:'#BDC7D2'} },
                yAxis:{ type:'value', name:'退货数量(件)', axisLabel:{color:'#B0BDC8'}, splitLine:{lineStyle:{color:'#203E54'}} },
                series:[{ type:'line', data:Object.values(monthReturn), smooth:true, lineStyle:{width:3, color:'#65C9D7'}, areaStyle:{opacity:0.2, color:'#3CACBD'} }]
            });

            // 2. 尺码销量横向柱状图
            chartSize.setOption({
                tooltip:{},
                grid:{
                    containLabel:true,
                    top: '15%',    // 顶部留空
                    bottom: '10%'  // 往下移动
                },
                xAxis:{ type:'value', name:'销量', axisLabel:{color:'#BDC7D2'} },
                yAxis:{ type:'category', data:Object.keys(sizeSale), axisLabel:{color:'#E4D6B2'} },
                series:[{ type:'bar', data:Object.values(sizeSale), itemStyle:{color:'#73B1C2', borderRadius:[0,8,8,0]} }]
            });

            // 3. 退货原因环形饼图（图例贴左下角，饼图上移）
            chartReason.setOption({
                backgroundColor: 'transparent',
                tooltip: { trigger: 'item' },
                legend: {
                    orient: 'vertical',
                    bottom: 0,          // 图例贴底
                    left: 10,           // 图例靠左，距离左侧10px
                    textStyle: {
                        color: '#E4D5AF',
                        fontSize: 10   // 图例字体缩小一点，避免超出
                    },
                    itemWidth: 16,      // 图例方块缩小，省空间
                    itemHeight: 12,
                    itemGap: 6          // 图例之间的间距调小一点
                },
                series: [{
                    type: 'pie',
                    radius: ['45%', '70%'],
                    center: ['55%', '35%'], // 饼图整体往右+往上挪，彻底避开左下角
                    data: Object.keys(reasonReturn).map(k => ({ name: k, value: reasonReturn[k] })),
                    label: {
                        color: '#F0E6CF',
                        formatter: '{d}%',
                        fontSize: 10
                    },
                    labelLine: {
                        lineStyle: {
                            color: '#E4D5AF'
                        }
                    }
                }]
            });
            // 4. 颜色退货分布饼图
            chartColor.setOption({
                legend:{ orient:'vertical', right:'right', textStyle:{color:'#E4D5AF'} },
                series:[{ 
                    type:'pie', 
                    radius:'55%', 
                    center: ['42%', '55%'],  // 往左42+往下移动55
                    data:Object.keys(colorReturn).map(k=>({name:k,value:colorReturn[k]})), 
                    label:{color:'#F5E9C8',formatter:'{d}%',fontSize:10}, 
                    labelLine:{lineStyle:{color:'#E4D5AF'}} 
                }]
            });

            // 5. 店铺销量柱状图（往下对齐优化）
            chartStore.setOption({
                grid: { 
                    top: 12,    // 保持顶部间距
                    bottom: 1,  // 往下对齐，核心修改
                    containLabel:true
                },
                xAxis:{ type:'category', data:Object.keys(storeSale), axisLabel:{rotate:20, color:'#C2CCD8'} },
                yAxis:{ type:'value', name:'销量(件)' },
                series:[{ type:'bar', data:Object.values(storeSale), itemStyle:{color:'#B99E5E', borderRadius:[6,6,0,0]} }]
            });

            // 6. 海外各国销量条形图
            chartCountry.setOption({
                grid:{bottom: 40, containLabel:true },
                xAxis:{ type:'value' },
                yAxis:{ type:'category', data:Object.keys(countrySale), axisLabel:{color:'#E1D1A5'} },
                series:[{ type:'bar', data:Object.values(countrySale), itemStyle:{color:'#6DA5B7'} }]
            });
        }

        // 渲染退货备注列表（完全适配你的Excel字段）
        function renderRemarkList(data) {
            let tbody = document.getElementById('remarkTbody');
            if(!tbody) return;
            let limited = data.slice(0,5);
            if(limited.length === 0){
                tbody.innerHTML = '<tr><td colspan="8">暂无退货备注数据</td></tr>';
                return;
            }
            let html = "";
            limited.forEach(row => {
                html += `<tr>
                    <td>${row.年份 || '-'}</td>
                    <td>${row.月份 || '-'}</td>
                    <td>${row.品名 || '-'}</td>
                    <td>${row.店铺 || '-'}</td>
                    <td>${row.颜色 || '-'}</td>
                    <td>${row.尺码 || '-'}</td>
                    <td>${row.退货原因 || '-'}</td>
                    <td>${row.退货备注 || '无'}</td>
                </tr>`;
            });
            tbody.innerHTML = html;
        }

        function switchPage(pageId) {
            document.querySelectorAll('.menu-item').forEach(item => item.classList.remove('active'));
            event.target.classList.add('active');
            document.querySelectorAll('.content-area > div').forEach(page => page.style.display = 'none');
            if(pageId === 'saleReturn') document.getElementById('saleReturnPage').style.display = 'block';
            if(pageId === 'saleReturn' && chartTrend) {
                [chartTrend, chartSize, chartReason, chartColor, chartStore, chartCountry].forEach(ch => ch && ch.resize());
            }
        }
    </script>
</body>
</html>
